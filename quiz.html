<script>
    let questions = [];
    let selectedQuestions = [];
    let userAnswers = [];
    const TOTAL = 20;

    async function loadQuestions() {
        console.log("🔄 Intentando cargar questions.json...");
        try {
            const response = await fetch('questions.json');
            
            // Si el archivo no se encuentra (404)
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            console.log("📦 Datos recibidos del JSON:", data);

            // Lógica flexible: funciona si el JSON es un array directo [...] 
            // O si es un objeto { questions: [...] }
            if (Array.isArray(data)) {
                questions = data;
            } else if (data && Array.isArray(data.questions)) {
                questions = data.questions;
            } else {
                throw new Error("El formato del JSON no es válido. Debe ser un array o un objeto con clave 'questions'.");
            }

            if (questions.length === 0) {
                throw new Error("El banco de preguntas está vacío.");
            }

            console.log(`✅ ÉXITO: ${questions.length} preguntas cargadas correctamente.`);
        } catch (error) {
            console.error("❌ ERROR CRÍTICO AL CARGAR:", error);
            alert("⚠️ No se pudieron cargar las preguntas. Revisa la consola (F12) o que el archivo questions.json esté en la raíz.");
        }
    }

    function startQuiz() {
        // Verificación de seguridad
        if (!questions || questions.length === 0) {
            console.error("❌ Intento de iniciar sin preguntas cargadas.");
            alert("⏳ Error: Las preguntas no se cargaron. Espera unos segundos y recarga la página.");
            return;
        }

        console.log("🚀 Iniciando evaluación con " + questions.length + " preguntas disponibles.");
        
        // Mezclar y seleccionar 20
        selectedQuestions = [...questions]
            .sort(() => Math.random() - 0.5)
            .slice(0, TOTAL);
            
        userAnswers = new Array(TOTAL).fill(null);
        
        document.getElementById('welcomeScreen').style.display = 'none';
        document.getElementById('quizScreen').classList.add('active');
        
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        selectedQuestions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question-card';
            div.innerHTML = `
                <h4>${i + 1}. ${q.question}</h4>
                <div class="options">
                    ${q.options.map((opt, j) => `
                        <label class="option-label">
                            <input type="radio" name="q${i}" value="${j}" onchange="saveAnswer(${i}, ${j})">
                            ${opt}
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(div);
        });
        updateProgress();
    }

    function saveAnswer(idx, val) {
        userAnswers[idx] = val;
        updateProgress();
    }

    function updateProgress() {
        const answered = userAnswers.filter(a => a !== null).length;
        document.getElementById('progressText').textContent = `Respondidas: ${answered} de ${TOTAL}`;
        document.getElementById('progressFill').style.width = `${(answered / TOTAL) * 100}%`;
    }

    function submitQuiz() {
        const unanswered = userAnswers.filter(a => a === null).length;
        if (unanswered > 0 && !confirm(`Te faltan ${unanswered} preguntas. ¿Finalizar igual?`)) return;

        let correct = 0;
        selectedQuestions.forEach((q, i) => {
            if (userAnswers[i] === q.correct) correct++;
        });

        const score = Math.round((correct / TOTAL) * 10 * 10) / 10;
        
        document.getElementById('quizScreen').classList.remove('active');
        document.getElementById('resultScreen').classList.remove('hidden');
        document.getElementById('scoreValue').textContent = score.toFixed(1);

        const badge = document.getElementById('scoreBadge');
        if (score >= 9) { badge.textContent = '🏆 Excelente'; badge.style.background = '#27ae60'; }
        else if (score >= 7) { badge.textContent = '👍 Muy Bien'; badge.style.background = '#2980b9'; }
        else if (score >= 5) { badge.textContent = '📚 Aprobado'; badge.style.background = '#f39c12'; }
        else { badge.textContent = '💪 Necesita Repaso'; badge.style.background = '#e74c3c'; }

        renderReview();
    }

    function renderReview() {
        const container = document.getElementById('reviewContainer');
        container.innerHTML = '';
        selectedQuestions.forEach((q, i) => {
            const isCorrect = userAnswers[i] === q.correct;
            const userText = userAnswers[i] !== null ? q.options[userAnswers[i]] : 'Sin responder';
            const correctText = q.options[q.correct];
            
            const div = document.createElement('div');
            div.className = `review-item ${isCorrect ? 'correct' : 'incorrect'}`;
            div.innerHTML = `
                <strong>${i + 1}. ${q.question}</strong><br>
                <span style="color:${isCorrect ? 'green' : 'red'}">Tu respuesta: ${userText} ${isCorrect ? '✅' : '❌'}</span><br>
                ${!isCorrect ? `<span style="color:green">Correcta: ${correctText}</span>` : ''}
            `;
            container.appendChild(div);
        });
    }

    document.addEventListener('DOMContentLoaded', loadQuestions);
</script>
